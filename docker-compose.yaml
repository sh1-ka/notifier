services:
  notbot:
    build:
      context: .
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./:/app

  db:
    image: postgres:17
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: